<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Diagnóstico de Segurança</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .report-page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #00f2fe;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .back-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="report-page-container">
        <a href="/" class="back-link">&larr; Voltar para o Painel</a>
        <div class="card report-card" style="padding: 2.5rem;">
            <div class="markdown-body" id="reportContent">
                <!-- Loaded Dynamically -->
            </div>
        </div>
    </div>

    <script id="markdown-data" type="application/json">
        {{ report_content|tojson }}
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawMarkdown = JSON.parse(document.getElementById('markdown-data').textContent);
            document.getElementById('reportContent').innerHTML = marked.parse(rawMarkdown);
        });
    </script>
</body>
</html>
